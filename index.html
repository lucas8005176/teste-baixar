<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload de Arquivos</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:400px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

input{
    margin:20px 0;
}

button,a{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    margin-top:15px;
}

button:hover,a:hover{
    background:#2563eb;
}

#info{
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">
<h2>Upload de Arquivo</h2>

<input type="file" id="arquivo">

<div id="info"></div>

<a id="download" style="display:none;">Baixar Arquivo</a>

</div>

<script>

const arquivo = document.getElementById("arquivo");
const info = document.getElementById("info");
const download = document.getElementById("download");

arquivo.addEventListener("change",function(){

    const file = this.files[0];

    if(!file) return;

    info.innerHTML=`
        <p><b>Nome:</b> ${file.name}</p>
        <p><b>Tamanho:</b> ${(file.size/1024).toFixed(2)} KB</p>
    `;

    const url = URL.createObjectURL(file);

    download.href=url;
    download.download=file.name;
    download.innerText="Baixar Arquivo";
    download.style.display="inline-block";

});

</script>

</body>
</html>

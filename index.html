<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download da Imagem</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#ffffff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
    text-align:center;
    max-width:500px;
}

h1{
    margin-bottom:20px;
    color:#222;
}

img{
    width:100%;
    border-radius:10px;
}

button{
    margin-top:20px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#0066ff;
    color:white;
    transition:.3s;
}

button:hover{
    background:#004dcc;
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">

<h1>Cristiano Ronaldo</h1>

<img
id="foto"
src="https://img.redbull.com/images/c_crop,x_195,y_0,h_681,w_545/c_fill,w_450,h_600/q_auto,f_auto/redbullcom/2018/07/10/69dcfced-2948-406f-9878-8f5a711ce7d0/cristianoronaldo"
alt="Cristiano Ronaldo">

<br>

<button onclick="baixarImagem()">
⬇ Download
</button>

</div>

<script>

function baixarImagem(){

    const link=document.createElement("a");

    link.href="https://img.redbull.com/images/c_crop,x_195,y_0,h_681,w_545/c_fill,w_450,h_600/q_auto,f_auto/redbullcom/2018/07/10/69dcfced-2948-406f-9878-8f5a711ce7d0/cristianoronaldo";

    link.download="Cristiano_Ronaldo.jpg";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

}

</script>

</body>
</html>
